{% extends 'recruitment/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="fw-bold mb-4 text-center">Pendaftaran Jalur Ujian CBT</h3>
            <div class="alert alert-info">Setelah mengisi biodata, Anda akan diarahkan ke halaman ujian.</div>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Nama Lengkap</label>
                    <input type="text" name="nama" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Posisi Dilamar</label>
                    <input type="text" name="posisi" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Pendidikan Terakhir</label>
                    <input type="text" name="pendidikan" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100 shadow fw-bold">Mulai Ujian Sekarang</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
